# nginx.example.conf — alternativa a Caddy para el reverse proxy en nas-rm.
# La GPU sigue en desktop-denis; nginx solo proxea por Tailscale.

server {
    listen 80;
    server_name audio.microbiolog-ia.com;

    client_max_body_size 200M;          # PDFs / audios grandes

    location / {
        proxy_pass http://desktop-denis:8080;   # IP/nombre Tailscale de la RTX
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # TTS de libros largos puede tardar: timeouts amplios
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_buffering off;            # streaming de audio sin buffer intermedio
    }
}

# Para HTTPS usa certbot, o mejor aún, deja que Caddy lo gestione (ver Caddyfile.example).
